name: pour_metrics_mobile_app
description: "Mobile app for PourMetrics - Smart Coaster analytics platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.2

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.69.0

  # Barcode / QR scanning
  mobile_scanner: ^5.2.3

  # Audio — beep on scan
  audioplayers: ^6.1.0

  # Internationalisation / date formatting
  intl: ^0.19.0

  # Offline queue + local cache
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4

  # Push notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
